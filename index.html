<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>BA Flow Generator – V4 Ultra Stable</title>

<!-- Mermaid -->
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>mermaid.initialize({ startOnLoad: false });</script>

<style>
body { font-family: Arial; margin: 20px; background: #f5f5f5; }
textarea { width: 100%; height: 200px; padding: 10px; border-radius: 6px; }
button { padding: 10px; margin: 8px; background: #0066ff; color: #fff; border: none; border-radius: 6px; }
#diagram { background: white; padding: 20px; margin-top: 20px; border-radius: 8px; }
</style>
</head>

<body>

<h1>BA Flow Generator – V4 (Fix Word / Long Text / Auto Split)</h1>

<textarea id="usinput" placeholder="Paste User Story vào đây..."></textarea>
<button onclick="convertUS()">Convert</button>

<h3>Mermaid Output</h3>
<textarea id="mermaidoutput"></textarea>
<button onclick="renderDiagram()">Vẽ Flow</button>

<div id="diagram"></div>

<script>
// RULE: Tách dòng mạnh
function smartSplit(raw) {
    return raw
        // Normalize bullets
        .replace(/[\u2022•\-–]/g, "\n")
        // Split periods
        .replace(/\.\s+/g, "\n")
        // Split semicolons
        .replace(/;\s+/g, "\n")
        // Split colon after key phrases
        .replace(/:(?=[A-Za-z])/g, ":\n")
        // Hard split BA keywords
        .replace(/\b(If|Else|Nếυ|Ngược lại|Requirement|Batch|Enhance|Status|Release|KID|MA )\b/gi, "\n$1")
        // Convert multiple spaces to newlines
        .replace(/ {4,}/g, "\n")
        .split("\n")
        .map(x => x.trim())
        .filter(x => x.length > 2);
}

// Clean for Mermaid
function safe(text) {
    return text
        .replace(/[{}[\]]/g, "")
        .replace(/[#*]/g, "")
        .trim();
}

function isIF(line) { return /(if|nếu|when|trường hợp)/i.test(line); }
function isELSE(line) { return /(else|ngược lại|otherwise|không thì)/i.test(line); }

function convertUS() {
    let raw = document.getElementById("usinput").value;
    let lines = smartSplit(raw).map(safe);

    console.log("DEBUG LINES:", lines);

    if (lines.length === 0) {
        document.getElementById("mermaidoutput").value =
            "flowchart TD\nA[Không tách được dòng nào]";
        return;
    }

    let nodes = [], edges = [];
    let stack = [];
    let last = null;

    lines.forEach((line, i) => {
        let id = "N" + (i + 1);
        let node = isIF(line)
            ? `${id}{${line}}`
            : `${id}[${line}]`;

        nodes.push(node);

        if (isIF(line)) {
            if (last) edges.push(`${last} --> ${id}`);
            stack.push(id);
            last = id;
            return;
        }

        if (isELSE(line)) {
            let parent = stack[stack.length - 1];
            edges.push(`${parent} -->|No| ${id}`);
            last = id;
            return;
        }

        if (stack.length > 0 && last === stack[stack.length - 1]) {
            let parent = stack[stack.length - 1];
            edges.push(`${parent} -->|Yes| ${id}`);
        } else if (last) {
            edges.push(`${last} --> ${id}`);
        }

        last = id;
    });

    let out = "flowchart TD\n    " + nodes.join("\n    ") +
              "\n\n    " + edges.join("\n    ");

    document.getElementById("mermaidoutput").value = out;
}

function renderDiagram() {
    let code = document.getElementById("mermaidoutput").value;
    document.getElementById("diagram").innerHTML =
        `<div class='mermaid'>${code}</div>`;
    mermaid.init();
}
</script>

</body>
</html>
