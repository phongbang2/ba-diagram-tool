<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>BA Flow Generator – Stable Version</title>

https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js
<script>
    mermaid.initialize({ startOnLoad: false });
</script>

<style>
body { font-family: Arial; margin: 20px; background: #f5f5f5; }
textarea { width: 100%; height: 200px; padding: 10px; border-radius: 6px; }
button { padding: 10px; margin: 8px; background: #0066ff; color: #fff; border: none; border-radius: 6px; }
#diagram { background: white; padding: 20px; margin-top: 20px; border-radius: 8px; }
</style>
</head>

<body>

<h1>BA Flow Generator – STABLE VERSION (Không bỏ sót dòng)</h1>

<textarea id="usinput" placeholder="Paste User Story vào đây..."></textarea>
<button onclick="convertUS()">Convert</button>

<h3>Mermaid Output</h3>
<textarea id="mermaidoutput"></textarea>
<button onclick="renderDiagram()">Vẽ Flow</button>

<div id="diagram"></div>

<script>
// CLEAN TEXT: remove only truly dangerous chars
function clean(text) {
    return text
        .replace(/[{}[\]]/g, "")     // Remove mermaid-breaking chars
        .replace(/[*#]/g, "")        // Remove bullets
        .replace(/–/g, "-")          // normalize unicode dash
        .replace(/\s+/g, " ")        // collapse spaces
        .trim();
}

// Split docx → real lines
function normalizeLines(raw) {
    return raw
        .split("\n")
        .flatMap(line => line.split(/•|–|- /))  // split bullets
        .map(l => clean(l))
        .filter(l => l.length > 0);
}

function isIF(line) { return /(if|nếu|when|trường hợp)/i.test(line); }
function isELSE(line) { return /(else|ngược lại|otherwise|không thì)/i.test(line); }

function convertUS() {
    let raw = document.getElementById("usinput").value;
    let lines = normalizeLines(raw);

    if (lines.length === 0) {
        document.getElementById("mermaidoutput").value = "flowchart TD\n    A[Không tìm thấy dòng hợp lệ]";
        return;
    }

    let nodes = [];
    let edges = [];
    let stack = [];
    let last = null;

    lines.forEach((line, idx) => {
        let id = "N" + (idx + 1);

        let node = isIF(line)
            ? `${id}{${line}}`
            : isELSE(line)
            ? `${id}[${line}]`
            : `${id}[${line}]`;

        nodes.push(node);

        if (isIF(line)) {
            if (last) edges.push(`${last} --> ${id}`);
            stack.push(id);
            last = id;
            return;
        }

        if (isELSE(line)) {
            if (stack.length > 0) {
                let parent = stack[stack.length - 1];
                edges.push(`${parent} -->|No| ${id}`);
            }
            last = id;
            return;
        }

        if (stack.length > 0 && last === stack[stack.length - 1]) {
            let parent = stack[stack.length - 1];
            edges.push(`${parent} -->|Yes| ${id}`);
        } else if (last) {
            edges.push(`${last} --> ${id}`);
        }

        last = id;
    });

    let out = "flowchart TD\n    " +
        nodes.join("\n    ") +
        "\n\n    " +
        edges.join("\n    ");

    document.getElementById("mermaidoutput").value = out;
}

function renderDiagram() {
    let code = document.getElementById("mermaidoutput").value;
    document.getElementById("diagram").innerHTML =
        `<div class="mermaid">${code}</div>`;
    mermaid.init();
}
</script>

</body>
</html>
