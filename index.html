<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>BA Flow Generator - Safe Mermaid Version</title>

https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js
<script>
    mermaid.initialize({ startOnLoad: false });
</script>

<style>
body { font-family: Arial; margin: 20px; background: #f5f5f5; }
textarea { width: 100%; height: 200px; padding: 10px; border-radius: 6px; }
button { padding: 10px; margin: 8px; background: #0066ff; color: #fff; border: none; border-radius: 6px; }
#diagram { background: white; padding: 20px; margin-top: 20px; border-radius: 8px; }
</style>
</head>

<body>

<h1>BA Flow Generator (No Error Version)</h1>

<p>Dán US vào đây:</p>
<textarea id="usinput"></textarea>

<button onclick="convertUS()">Convert</button>

<h3>Mermaid Result</h3>
<textarea id="mermaidoutput"></textarea>

<button onclick="renderDiagram()">Vẽ Flow</button>

<div id="diagram"></div>

<script>
// Clean dangerous characters
function cleanText(t) {
    return t
        .replace(/{}[\]/g, "")   // remove brackets
        .replace(/[#!=*]/g, "")      // remove dangerous chars
        .replace(/\s+/g, " ")        // collapse spaces
        .trim();
}

// Detect GL code lines → skip
function isGL(line) {
    return /^\d{3,}/.test(line) ||
           /(GENLCDE|S.code|LP|MP|LN|VP)/i.test(line);
}

function isIF(line) { return /(nếu|if|when|trường hợp)/i.test(line); }
function isELSE(line) { return /(ngược lại|else|otherwise)/i.test(line); }

function convertUS() {
    let lines = document.getElementById("usinput").value
        .split("\n")
        .map(l => cleanText(l))
        .filter(l => l.length > 0 && !isGL(l));  // skip GL rows

    let nodes = [];
    let edges = [];
    let stack = [];
    let lastNode = null;

    lines.forEach((line, idx) => {
        let id = "N" + (idx + 1);
        let safe = cleanText(line);

        // create node
        let node = isIF(line) ? `${id}{${safe}}`
                 : isELSE(line) ? `${id}[${safe}]`
                 : `${id}[${safe}]`;

        nodes.push(node);

        // IF branch
        if (isIF(line)) {
            if (lastNode) edges.push(`${lastNode} --> ${id}`);
            stack.push(id);
            lastNode = id;
            return;
        }

        // ELSE branch
        if (isELSE(line)) {
            const parent = stack[stack.length - 1];
            edges.push(`${parent} -->|No| ${id}`);
            lastNode = id;
            return;
        }

        // YES branch
        if (stack.length > 0 && lastNode === stack[stack.length - 1]) {
            const parent = stack[stack.length - 1];
            edges.push(`${parent} -->|Yes| ${id}`);
        } else if (lastNode) {
            edges.push(`${lastNode} --> ${id}`);
        }

        lastNode = id;
    });

    document.getElementById("mermaidoutput").value =
        "flowchart TD\n    " + nodes.join("\n    ") +
        "\n\n    " + edges.join("\n    ");
}

function renderDiagram() {
    document.getElementById("diagram").innerHTML =
        `<div class="mermaid">${document.getElementById("mermaidoutput").value}</div>`;
    mermaid.init();
}
</script>

</body>
</html>
