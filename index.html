<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>BA Flow Generator - Safe Clean Version</title>

https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js
<script>
    mermaid.initialize({ startOnLoad: false });
</script>

<style>
body { font-family: Arial; margin: 20px; background: #f5f5f5; }
textarea { width: 100%; height: 200px; padding: 10px; border-radius: 6px; }
button { padding: 10px; margin: 8px; background: #0066ff; color: #fff; border: none; border-radius: 6px; }
#diagram { background: white; padding: 20px; margin-top: 20px; border-radius: 8px; }
</style>
</head>

<body>

<h1>BA Flow Generator – SAFE VERSION (Không còn lỗi Mermaid)</h1>

<textarea id="usinput" placeholder="Paste User Story vào đây..."></textarea>
<button onclick="convertUS()">Convert</button>

<h3>Mermaid Output</h3>
<textarea id="mermaidoutput"></textarea>
<button onclick="renderDiagram()">Vẽ Flow</button>

<div id="diagram"></div>

<script>

// ----------------------------
// 1. RULE: Loại bỏ bảng & GL
// ----------------------------
function isNoise(line) {
    return (
        /^\d{3,}/.test(line) ||          // dòng bắt đầu bằng số
        /GENLCDE|S.code|GL sign/i.test(line) ||
        /\b(LP|MP|LN|VP|EY|EX|MS)\b/i.test(line) ||
        line.length < 3
    );
}

// ----------------------------
// 2. Clean dangerous characters
// ----------------------------
function sanitize(text) {
    return text
        .replace(/{}[\]/g, "")      // remove mermaid breaking chars
        .replace(/[#!=>*]/g, "")        // remove symbols
        .replace(/\s+/g, " ")           // normalize whitespace
        .trim()
        .slice(0, 80);                  // MAX 80 chars → avoid Mermaid crash
}

// ----------------------------
// 3. Detect IF / ELSE
// ----------------------------
function isIF(line) { return /(nếu|if|when|trường hợp)/i.test(line); }
function isELSE(line) { return /(ngược lại|else|otherwise|không thì)/i.test(line); }

// ----------------------------
// 4. MAIN
// ----------------------------
function convertUS() {
    let rawLines = document.getElementById("usinput").value.split("\n");

    let lines = rawLines
        .map(x => sanitize(x))
        .filter(x => x.length > 0 && !isNoise(x));

    let nodes = [];
    let edges = [];

    let stack = [];
    let last = null;

    lines.forEach((line, index) => {
        let id = "N" + (index + 1);

        let node = isIF(line)
            ? `${id}{${line}}`
            : `${id}[${line}]`;

        nodes.push(node);

        if (isIF(line)) {
            if (last) edges.push(`${last} --> ${id}`);
            stack.push(id);
            last = id;
            return;
        }

        if (isELSE(line)) {
            let parent = stack[stack.length - 1];
            edges.push(`${parent} -->|No| ${id}`);
            last = id;
            return;
        }

        if (stack.length > 0 && last === stack[stack.length - 1]) {
            let parent = stack[stack.length - 1];
            edges.push(`${parent} -->|Yes| ${id}`);
        } else if (last) {
            edges.push(`${last} --> ${id}`);
        }

        last = id;
    });

    let out =
        "flowchart TD\n    " +
        nodes.join("\n    ") +
        "\n\n    " +
        edges.join("\n    ");

    document.getElementById("mermaidoutput").value = out;
}

// ----------------------------
// 5. Render Mermaid
// ----------------------------
function renderDiagram() {
    let code = document.getElementById("mermaidoutput").value;
    document.getElementById("diagram").innerHTML = `<div class="mermaid">${code}</div>`;
    mermaid.init();
}

</script>

</body>
</html>
